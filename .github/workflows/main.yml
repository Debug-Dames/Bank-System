name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd Backend
          npm install

      # 4. Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 5. Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 6. Run backend tests (optional)
      - name: Run backend tests
        run: |
          cd Backend
          npm test || echo "No tests found"

      # 7. Build Docker images
      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./Backend

      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frontend

      # 8. Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 9. Push images
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend

      # 10. Optional deploy step
      - name: Deploy to Kubernetes
        run: echo "kubectl apply -f k8s/"
        
