name: Full Stack CI Pipeline
 
on:
  push:
    branches: [ "main , dev" ]
  pull_request:
    branches: [ "main , dev" ]
 
jobs:
  backend:
    runs-on: ubuntu-latest
 
    defaults:
      run:
        working-directory: ./Backend
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install backend dependencies
        run: npm install
 
      - name: Run backend tests (if any)
        run: npm test || echo "No tests"
 
      - name: Build backend Docker image
        run: docker build -t bank-backend .
 
  frontend:
    runs-on: ubuntu-latest
 
    defaults:
      run:
        working-directory: ./Frontend
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install frontend dependencies
        run: npm install
 
      - name: Build frontend
        run: npm run build
