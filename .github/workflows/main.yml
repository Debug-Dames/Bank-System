name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. DEBUG: Confirm Docker username is loaded (REMOVE LATER if you want)
      - name: Debug Docker username
        run: echo "Docker username = ${{ secrets.DOCKER_USERNAME }}"

      # 4. Install backend dependencies
      - name: Install backend dependencies
        run: |
          cd Backend
          npm install

      # 5. Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # 6. Build frontend
      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # 7. Run backend tests (optional)
      - name: Run backend tests
        run: |
          cd Backend
          npm test || echo "No tests found"

      # 8. Build backend Docker image (FIXED)
      - name: Build backend Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend ./Backend

      # 9. Build frontend Docker image
      - name: Build frontend Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend ./frontend

      # 10. Login to DockerHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 11. Push backend image
      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend

      # 12. Push frontend image
      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend

      # 13. Deploy (placeholder)
      - name: Deploy to Kubernetes
        run: echo "kubectl apply -f k8s/"
    
        
